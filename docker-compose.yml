services:
  db:
    image: mongodb/mongodb-community-server:latest
    ports:
      - "27017:27017"

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - MONGO_HOST=db
      - MONGO_PORT=27017